
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
        <style>
            body { padding: 50px; background-color: #f8f7ff; font-family: 'Plus Jakarta Sans', sans-serif; }
            .preview-box { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
            h3 { margin-bottom: 20px; color: #666; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        </style>
    </head>
    <body>
        <div class="preview-box">
            <h3>Option 1: Div-based with absolute dot (modern clients)</h3>
            
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
        <tr>
            <td align="center" valign="middle" style="padding: 10px;">
                <!-- Orbit Ring (Dashed Circle) -->
                <div style="width: 60px; height: 60px; border: 1.5px dashed #6c47ff; border-radius: 50%; opacity: 0.6; position: relative; display: flex; align-items: center; justify-content: center;">
                    
                    <!-- Teal Dot (Anchored to top-left of ring) -->
                    <div style="position: absolute; top: 4px; left: 4px; width: 8px; height: 8px; background-color: #00d4c8; border-radius: 50%; box-shadow: 0 0 6px #00d4c8;"></div>
                    
                    <!-- Rounded Logo Box -->
                    <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #6c47ff, #ff6bc6); background-color: #6c47ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(108,71,255,0.3);">
                        <!-- SVG H Logo -->
                        <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
                            <rect x="2" y="3" width="4" height="16" rx="2" fill="white" fill-opacity="0.95"/>
                            <rect x="16" y="3" width="4" height="16" rx="2" fill="white" fill-opacity="0.95"/>
                            <rect x="2" y="9" width="18" height="4" rx="2" fill="white" fill-opacity="0.95"/>
                        </svg>
                    </div>
                </div>
            </td>
            <td valign="middle" style="padding-left: 12px;">
                <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #6c47ff, #ff6bc6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: #6c47ff; letter-spacing: -1.2px; line-height: 1;">Hireon</span>
            </td>
        </tr>
    </table>
    
            
            <br/><br/><hr/><br/><br/>
            
            <h3>Option 2: Table-based (Legacy Compatibility)</h3>
            
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
        <tr>
            <td align="center" valign="middle">
                <!-- Wrapper for Orbit -->
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="64" height="64" style="border: 1.5px dashed #6c47ff; border-radius: 50%;">
                    <tr>
                        <td align="center" valign="middle">
                            <!-- Inner Box -->
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="40" height="40" style="background: linear-gradient(135deg, #6c47ff, #ff6bc6); background-color: #6c47ff; border-radius: 11px;">
                                <tr>
                                    <td align="center" valign="middle">
                                        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="20" height="20">
                                            <tr>
                                                <td width="4" height="20" rowspan="3" style="background-color: #ffffff; border-radius: 2px;"></td>
                                                <td width="12" height="8"></td>
                                                <td width="4" height="20" rowspan="3" style="background-color: #ffffff; border-radius: 2px;"></td>
                                            </tr>
                                            <tr>
                                                <td width="12" height="4" style="background-color: #ffffff; border-radius: 2px;"></td>
                                            </tr>
                                            <tr>
                                                <td width="12" height="8"></td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
            <td valign="middle" style="padding-left: 15px;">
                <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #6c47ff, #ff6bc6); -webkit-background-clip: text; color: #6c47ff; letter-spacing: -1px;">Hireon</span>
            </td>
        </tr>
    </table>
    
            
            <p style="margin-top: 40px; color: #999; font-size: 12px;">The teal dot is difficult in pure tables without absolute positioning. <br/>I will use a hybrid approach that provides the best look on Gmail while falling back safely.</p>
        </div>
    </body>
    </html>
