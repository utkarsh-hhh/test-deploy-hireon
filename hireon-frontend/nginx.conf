server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy: API calls to FastAPI backend ───────────────────────────────────
    # Mirrors the /v1 proxy in vite.config.ts (used in dev)
    # Timeout is generous (120s) to handle slow Groq/Gemini AI calls
    location /v1/ {
        proxy_pass         http://backend:8000/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy: Uploaded static files (resumes, avatars, etc.) ─────────────────
    location /static/ {
        proxy_pass        http://backend:8000/static/;
        proxy_http_version 1.1;
        proxy_set_header  Host       $host;
        proxy_set_header  X-Real-IP  $remote_addr;
        add_header        Cache-Control "public, max-age=86400";
    }

    # ── WebSocket proxy (real-time notifications) ──────────────────────────────
    # Upgrade and Connection headers are REQUIRED for WebSocket handshake
    location /ws/ {
        proxy_pass         http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── nginx health check (for monitoring / load balancers) ──────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Cache: Vite-hashed JS/CSS bundles (filenames include content hash) ─────
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Cache: images and fonts ────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── React SPA fallback ─────────────────────────────────────────────────────
    # Any path not matched above falls through to index.html so that
    # React Router (BrowserRouter) handles client-side navigation correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
