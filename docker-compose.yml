
services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: hireon_postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hireon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hireon_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireon -d hireon_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hireon-network

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./hireon-backend
      dockerfile: Dockerfile
    container_name: hireon_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      # Always override DATABASE_URL to use the postgres service hostname.
      # The .env.docker file may have localhost — this ensures it points correctly.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hireon}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hireon_db}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      APP_ENV: production
    volumes:
      # Persists uploaded resumes, JDs, avatars across container rebuilds
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - hireon-network

  # ── React Frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./hireon-frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Vite bundle at build time.
        # Using an empty string ensures Axios uses relative paths:
        # requests automatically go to the same host/port as the frontend (e.g. localhost:3000)
        # and nginx handles proxying to the backend.
        VITE_API_BASE_URL: ""
    container_name: hireon_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hireon-network

# ── Named Volumes ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────
networks:
  hireon-network:
    driver: bridge
